<script>
// Robust async library loader with multiple CDN fallbacks
(function(){
  var libs=[
    {name:'docx',global:'docx',urls:[
      'https://unpkg.com/docx@8.2.3/build/index.js',
      'https://cdn.jsdelivr.net/npm/docx@8.2.3/build/index.js',
      'https://unpkg.com/docx@7.8.2/build/index.js',
      'https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js'
    ]},
    {name:'FileSaver',global:'saveAs',urls:[
      'https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js',
      'https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js'
    ]},
    {name:'JSZip',global:'JSZip',urls:[
      'https://unpkg.com/jszip@3.10.1/dist/jszip.min.js',
      'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js'
    ]}
  ];
  window._libsReady=new Promise(function(resolve){
    var loaded=0,total=libs.length;
    libs.forEach(function(lib){tryLoad(lib,0,function(){loaded++;if(loaded===total)resolve();});});
  });
  function tryLoad(lib,idx,cb){
    if(idx>=lib.urls.length){console.error('FAILED to load: '+lib.name);cb();return;}
    var s=document.createElement('script');s.src=lib.urls[idx];
    s.onload=function(){
      if(typeof window[lib.global]!=='undefined'){console.log('Loaded '+lib.name+' from '+s.src);cb();}
      else{document.head.removeChild(s);tryLoad(lib,idx+1,cb);}
    };
    s.onerror=function(){document.head.removeChild(s);tryLoad(lib,idx+1,cb);};
    document.head.appendChild(s);
  }
})();
</script>

let lang='vi',step=0,data={};
let photoData=null;
// Zairyu: each side can have multiple files

// Certs: each category stores array of {name,data}
let certFiles={certSenmon:[],certLicense:[],certJlpt:[],certTokutei:[],certOther:[]};
let eduRows=[{start:'',end:'',detail:''}];
let workRows=[{start:'',end:'',country:'home',visa:'',detail:''}];
let licRows=[{date:'',detail:''}];
const emails=["nguyen.thi.hong@yourbright.co.jp","yu.nandar.mon@yourbright.co.jp","chom.sreynak@yourbright.co.jp","muslikhun.ahmad@yourbright.co.jp"];

function t(k){return(L[lang]&&L[lang][k])||L['vi'][k]||k}
function setLang(l,btn){lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updateUI();}
function updateUI(){
  document.getElementById('welcomeTitle').textContent=t('welcome');
  document.getElementById('welcomeDesc').textContent=t('welcomeDesc');
  document.getElementById('btnStart').textContent=t('start');
  document.getElementById('successTitle').textContent=t('successT');
  document.getElementById('successDesc').textContent=t('successD');
  document.getElementById('btnDL2').textContent=t('download');
  document.getElementById('btnEM2').textContent=t('sendEmail');
  document.getElementById('btnRS2').textContent=t('restart');
}
updateUI();

// =========================================================
//  FORM FLOW
// =========================================================
function startForm(){
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('progressSection').classList.remove('hidden');
  document.getElementById('navButtons').classList.remove('hidden');
  document.getElementById('langSection').classList.add('hidden');
  showStep();
}
function getOpts(ty){
  if(ty==='gender')return[t('male'),t('female'),t('other')];
  if(ty==='yesno')return[t('no'),t('yes')];
  return[];
}
function showStep(){
  const f=FIELDS[step],area=document.getElementById('questionArea');
  document.getElementById('progressFill').style.width=((step+1)/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=`${step+1} / ${TOTAL}`;
  document.getElementById('btnPrev').classList.toggle('hidden',step===0);
  document.getElementById('btnPrev').textContent=t('prev');
  document.getElementById('btnNext').textContent=step===TOTAL-1?t('submit'):t('next');
  const fl=t(f.key),sv=data[f.key]||'';
  let h=`<div class="q-number">${t('qLabel')} ${step+1} / ${TOTAL}</div><div class="q-title">${fl}</div><div class="q-title-jp">${f.jp}</div><div style="height:6px"></div>`;
  if(f.type==='text'||f.type==='tel'||f.type==='email')h+=`<input type="${f.type}" class="q-input" id="qInput" value="${sv}">`;
  else if(f.type==='date')h+=`<input type="date" class="q-input" id="qInput" value="${sv}">`;
  else if(f.type==='select'){const o=getOpts(f.opts);h+=`<select class="q-input" id="qInput"><option value="">--</option>${o.map(x=>`<option value="${x}"${sv===x?' selected':''}>${x}</option>`).join('')}</select>`;}
  else if(f.type==='textarea')h+=`<textarea class="q-input" id="qInput" rows="4">${sv}</textarea>`;
  else if(f.type==='photo')h+=buildPhotoUpload();
  else if(f.type==='photo_zairyu')h+=buildZairyu();
  else if(f.type==='dynamic_edu')h+=buildEdu();
  else if(f.type==='dynamic_work')h+=buildWork();
  else if(f.type==='dynamic_license')h+=buildLic();
  else if(f.type==='cert_upload')h+=buildCerts();
  area.innerHTML=h;
  const inp=document.getElementById('qInput');
  if(inp){setTimeout(()=>inp.focus(),80);if(f.type!=='textarea')inp.addEventListener('keydown',e=>{if(e.key==='Enter')nextQuestion()});}
}

// ===== PHOTO =====
function buildPhotoUpload(){
  return `<div class="photo-upload">
    <div class="photo-preview">${photoData?`<img src="${photoData}">`:`<div class="photo-placeholder">${t('uploadPhoto')}</div>`}</div>
    <div><input type="file" id="pf_main" accept="image/*" style="display:none" onchange="onMainPhoto(this)">
    <button class="upload-btn" onclick="document.getElementById('pf_main').click()">📷 ${t('uploadPhoto')}</button></div>
  </div>`;
}
function onMainPhoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{photoData=e.target.result;showStep();};r.readAsDataURL(f);}

// ===== ZAIRYU =====
function buildZairyu(){
  let h=`<div class="q-subtitle">${t('zairyu')}</div><div class="upload-grid">`;
  // Front
  h+=`<div class="upload-card ${zairyuFront.length?'has-file':''}">
    ${zairyuFront.length?zairyuFront.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}">`:`<span class="file-tag">📎 ${f.name}</span>`).join('')+`<div class="upload-status">${t('zairyuFront')} - ${t('uploaded')} (${zairyuFront.length})</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuFront')}</div>`}
    <input type="file" id="zf_front" accept="image/*,.pdf,.doc,.docx" multiple style="display:none" onchange="onZairyu('front',this)">
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('zf_front').click()">${t('uploadClick')}</button>
  </div>`;
  // Back
  h+=`<div class="upload-card ${zairyuBack.length?'has-file':''}">
    ${zairyuBack.length?zairyuBack.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}">`:`<span class="file-tag">📎 ${f.name}</span>`).join('')+`<div class="upload-status">${t('zairyuBack')} - ${t('uploaded')} (${zairyuBack.length})</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuBack')}</div>`}
    <input type="file" id="zf_back" accept="image/*,.pdf,.doc,.docx" multiple style="display:none" onchange="onZairyu('back',this)">
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('zf_back').click()">${t('uploadClick')}</button>
  </div></div>`;
  return h;
}
function onZairyu(side,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  let loaded=0;const target=side==='front'?zairyuFront:zairyuBack;
  files.forEach(file=>{const r=new FileReader();r.onload=e=>{target.push({name:file.name,data:e.target.result});loaded++;if(loaded===files.length)showStep();};r.readAsDataURL(file);});
}

// ===== CERTS (multi-file per category) =====
function buildCerts(){
  const cats=[
    {key:'certSenmon',icon:'📜'},{key:'certLicense',icon:'🚗'},
    {key:'certJlpt',icon:'🇯🇵'},{key:'certTokutei',icon:'🏭'},{key:'certOther',icon:'📎'}
  ];
  let h=`<div class="q-subtitle">${t('cert_photos')}<br><small style="color:#667eea">${t('multiFile')}</small></div><div class="upload-grid">`;
  cats.forEach(c=>{
    const arr=certFiles[c.key]||[];
    h+=`<div class="upload-card ${arr.length?'has-file':''}">
      ${arr.length?arr.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}">`:`<span class="file-tag">📎 ${f.name}</span>`).join('')+`<div class="upload-status">${t(c.key)} (${arr.length})</div>`:`<div class="upload-icon">${c.icon}</div><div class="upload-label">${t(c.key)}</div>`}
      <input type="file" id="cf_${c.key}" accept="image/*,.pdf,.doc,.docx" multiple style="display:none" onchange="onCert('${c.key}',this)">
      <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('cf_${c.key}').click()">${t('uploadClick')}</button>
    </div>`;
  });
  h+='</div>';return h;
}
function onCert(key,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  let loaded=0;
  files.forEach(file=>{const r=new FileReader();r.onload=e=>{certFiles[key].push({name:file.name,data:e.target.result});loaded++;if(loaded===files.length)showStep();};r.readAsDataURL(file);});
}

// ===== DYNAMIC ROWS =====
function buildEdu(){
  let h=`<div class="hint-box">${t('eduNote1')}<br>${t('eduNote2')}<br>${t('eduNote3')}</div>`;
  h+=`<div class="dynamic-section"><div class="row-labels"><span>${t('startDate')}</span><span>${t('endDate')}</span><span>${t('detail')}</span><span></span></div>`;
  eduRows.forEach((r,i)=>{h+=`<div class="dynamic-row"><input type="text" placeholder="2021/07" value="${r.start}" onchange="eduRows[${i}].start=this.value"><input type="text" placeholder="2024/06" value="${r.end}" onchange="eduRows[${i}].end=this.value"><textarea placeholder="${t('eduHint')}" onchange="eduRows[${i}].detail=this.value">${r.detail}</textarea>${eduRows.length>1?`<button class="btn-remove-row" onclick="eduRows.splice(${i},1);showStep()">×</button>`:'<div></div>'}</div>`;});
  h+=`</div><div class="btn-add-row" onclick="eduRows.push({start:'',end:'',detail:''});showStep()">${t('addRow')}</div>`;return h;
}
function buildWork(){
  let h=`<div class="hint-box">${t('workNote1')}</div>`;
  h+=`<div class="dynamic-section">`;
  workRows.forEach((r,i)=>{
    const isJP=r.country==='jp';
    h+=`<div class="work-entry" style="border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-bottom:10px;background:#fafafa">
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px">
        <input type="text" class="q-input" style="padding:8px;font-size:13px" placeholder="2025/05" value="${r.start}" onchange="workRows[${i}].start=this.value">
        <input type="text" class="q-input" style="padding:8px;font-size:13px" placeholder="${t('current')}" value="${r.end}" onchange="workRows[${i}].end=this.value">
        ${workRows.length>1?`<button class="btn-remove-row" onclick="workRows.splice(${i},1);showStep()">×</button>`:'<div></div>'}
      </div>
      <div style="margin-bottom:6px">
        <label style="font-size:11px;color:#667eea;font-weight:600">🌏 ${t('workCountry')}</label>
        <select class="q-input" style="padding:8px;font-size:13px" onchange="workRows[${i}].country=this.value;showStep()">
          <option value="home"${r.country==='home'?' selected':''}>${t('countryHome')}</option>
          <option value="jp"${r.country==='jp'?' selected':''}>${t('countryJP')}</option>
          <option value="other"${r.country==='other'?' selected':''}>${t('countryOther')}</option>
        </select>
      </div>
      ${isJP?`<div style="margin-bottom:6px">
        <label style="font-size:11px;color:#e65100;font-weight:600">🏷️ ${t('workVisa')}</label>
        <input type="text" class="q-input" style="padding:8px;font-size:13px" placeholder="技能実習1号 / 特定技能1号..." value="${r.visa||''}" onchange="workRows[${i}].visa=this.value">
      </div>`:''}
      <textarea class="q-input" style="padding:8px;font-size:13px;min-height:50px" placeholder="${t('workHint')}" onchange="workRows[${i}].detail=this.value">${r.detail}</textarea>
    </div>`;
  });
  h+=`</div><div class="btn-add-row" onclick="workRows.push({start:'',end:'',country:'home',visa:'',detail:''});showStep()">${t('addRow')}</div>`;return h;
}
function buildLic(){
  let h=`<div class="dynamic-section"><div class="row-labels"><span>${t('startDate')}</span><span></span><span>${t('detail')}</span><span></span></div>`;
  licRows.forEach((r,i)=>{h+=`<div class="dynamic-row"><input type="text" placeholder="2025/11" value="${r.date}" onchange="licRows[${i}].date=this.value"><div></div><textarea placeholder="${t('licHint')}" onchange="licRows[${i}].detail=this.value">${r.detail}</textarea>${licRows.length>1?`<button class="btn-remove-row" onclick="licRows.splice(${i},1);showStep()">×</button>`:'<div></div>'}</div>`;});
  h+=`</div><div class="btn-add-row" onclick="licRows.push({date:'',detail:''});showStep()">${t('addRow')}</div>`;return h;
}

function saveCurrent(){const f=FIELDS[step];if(['photo','photo_zairyu','cert_upload'].includes(f.type)||f.type.startsWith('dynamic_'))return;const inp=document.getElementById('qInput');if(inp)data[f.key]=inp.value;}
function saveDynamic(){
  const f=FIELDS[step];
  if(f.type==='dynamic_edu')document.querySelectorAll('.dynamic-row').forEach((row,i)=>{if(!eduRows[i])return;const ins=row.querySelectorAll('input');const ta=row.querySelector('textarea');if(ins[0])eduRows[i].start=ins[0].value;if(ins[1])eduRows[i].end=ins[1].value;if(ta)eduRows[i].detail=ta.value;});
  else if(f.type==='dynamic_work')document.querySelectorAll('.work-entry').forEach((row,i)=>{if(!workRows[i])return;const ins=row.querySelectorAll('input[type="text"]');const sel=row.querySelector('select');const ta=row.querySelector('textarea');if(ins[0])workRows[i].start=ins[0].value;if(ins[1])workRows[i].end=ins[1].value;if(sel)workRows[i].country=sel.value;if(workRows[i].country==='jp'&&ins[2])workRows[i].visa=ins[2].value;if(ta)workRows[i].detail=ta.value;});
  else if(f.type==='dynamic_license')document.querySelectorAll('.dynamic-row').forEach((row,i)=>{if(!licRows[i])return;const ins=row.querySelectorAll('input');const ta=row.querySelector('textarea');if(ins[0])licRows[i].date=ins[0].value;if(ta)licRows[i].detail=ta.value;});
}
function nextQuestion(){saveCurrent();saveDynamic();if(step<TOTAL-1){step++;showStep();}else showReview();}
function prevQuestion(){saveCurrent();saveDynamic();if(step>0){step--;showStep();}}

// =========================================================
//  REVIEW
// =========================================================
function thumbs(arr){if(!arr||!arr.length)return'-';return arr.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}" class="review-thumb">`:`<span class="file-tag">📎 ${f.name}</span>`).join(' ');}
function showReview(){
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('navButtons').classList.add('hidden');
  document.getElementById('progressSection').classList.add('hidden');
  const ra=document.getElementById('reviewArea');ra.classList.remove('hidden');
  let rows='';
  FIELDS.forEach(f=>{
    const lb=`${t(f.key)} (${f.jp})`;let v='';
    if(f.type==='photo')v=photoData?`<img src="${photoData}" class="review-photo">`:'-';
    else if(f.type==='photo_zairyu')v=thumbs(zairyuFront)+' '+thumbs(zairyuBack);
    else if(f.type==='cert_upload'){v='';Object.keys(certFiles).forEach(k=>{if(certFiles[k].length)v+=`<b>${t(k)}:</b> `+thumbs(certFiles[k])+'<br>';});if(!v)v='-';}
    else if(f.type==='dynamic_edu')v=eduRows.filter(r=>r.detail).map(r=>`${r.start} ~ ${r.end}　${r.detail}`).join('<br>')||'-';
    else if(f.type==='dynamic_work')v=workRows.filter(r=>r.detail).map(r=>{const c=r.country==='jp'?'🇯🇵':'🌏';const visa=r.country==='jp'&&r.visa?` [${r.visa}]`:'';return`${r.start} ~ ${r.end}　${c} ${r.detail}${visa}`}).join('<br>')||'-';
    else if(f.type==='dynamic_license')v=licRows.filter(r=>r.detail).map(r=>`${r.date}　${r.detail}`).join('<br>')||'-';
    else v=data[f.key]||'-';
    rows+=`<tr><th>${lb}</th><td>${v}</td></tr>`;
  });
  let ec=emails.map((e,i)=>`<div class="email-item"><input type="checkbox" id="em_${i}" value="${e}" checked><label for="em_${i}">${e}</label></div>`).join('');
  ra.innerHTML=`<h2 style="color:#1a237e;margin-bottom:4px">${t('reviewT')}</h2><p style="color:#888;font-size:11px;margin-bottom:10px">${t('reviewD')}</p><div style="max-height:400px;overflow-y:auto"><table class="review-table">${rows}</table></div><h3 style="color:#1a237e;margin-top:18px;margin-bottom:6px">📧 ${t('emailT')}</h3><div class="email-list">${ec}</div><div class="final-actions"><button class="btn-action" style="background:#f0f0f0;color:#555" onclick="backToEdit()">← ${t('prev')}</button><button class="btn-action btn-download" onclick="doDownloadZip()">📥 ${t('download')}</button><button class="btn-action btn-email" onclick="doEmailZip()">📧 ${t('sendEmail')}</button></div>`;
}
function backToEdit(){document.getElementById('reviewArea').classList.add('hidden');document.getElementById('questionArea').classList.remove('hidden');document.getElementById('navButtons').classList.remove('hidden');document.getElementById('progressSection').classList.remove('hidden');step=TOTAL-1;showStep();}
function getSelectedEmails(){return emails.filter((_,i)=>{const cb=document.getElementById(`em_${i}`);return cb&&cb.checked;});}

function showLoading(m,s){document.getElementById('loadingText').textContent=m||t('generating');document.getElementById('loadingSub').textContent=s||t('pleaseWait');document.getElementById('loadingOverlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');}

// =========================================================
//  WORD GENERATION
// =========================================================
async function generateWord(){
  // Wait for libraries to load
  if(window._libsReady) await window._libsReady;
  if(typeof docx==='undefined') throw new Error('Word library not loaded. Please refresh the page and try again.');
  const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,BorderStyle,ImageRun,VerticalAlign,HeightRule}=docx;
  const bdr={style:BorderStyle.SINGLE,size:1,color:"000000"},noBdr={style:BorderStyle.NONE,size:0,color:"FFFFFF"};
  const borders={top:bdr,bottom:bdr,left:bdr,right:bdr},noBorders={top:noBdr,bottom:noBdr,left:noBdr,right:noBdr};
  // Match template: MS 明朝 font, total width 10490 DXA, A4 page
  const F="ＭＳ 明朝",F2="Times New Roman",TW=10490;
  // Column widths matching template: 6 columns
  const W0=1843,W1=1701,W2=1822,W3=2100,W4=524,W5=2500;
  // W0+W1+W2+W3+W4+W5 = 10490

  function mkCell(text,w,o={}){
    const lines=(text||'').split('\n');
    const pars=lines.map(line=>new Paragraph({
      alignment:o.center?AlignmentType.CENTER:o.right?AlignmentType.RIGHT:AlignmentType.LEFT,
      spacing:{before:20,after:20},
      children:[new TextRun({text:line,bold:!!o.bold,size:o.size||20,font:o.font||F,color:o.color||"000000"})]
    }));
    return new TableCell({
      width:{size:w,type:WidthType.DXA},
      borders:o.nb?noBorders:borders,
      verticalAlign:o.vtop?VerticalAlign.TOP:VerticalAlign.CENTER,
      children:pars.length?pars:[new Paragraph({children:[]})],
      columnSpan:o.cs,rowSpan:o.rs
    });
  }

  const today=new Date(),yy=today.getFullYear(),mm=String(today.getMonth()+1).padStart(2,'0'),dd=String(today.getDate()).padStart(2,'0');
  let photoBlob=null;
  if(photoData){try{const r=await fetch(photoData);photoBlob=await r.arrayBuffer();}catch(e){}}
  async function imgBlob(dataUrl){try{const r=await fetch(dataUrl);return await r.arrayBuffer();}catch(e){return null;}}

  const DC=[];

  // ============================================================
  //  TABLE 0: Main info (17 rows x 6 cols) — matching template
  // ============================================================
  const t0rows=[];

  // Row 0: 履歴書 title + date (col0-1 merged=span2, col2-5 merged=span4 but template shows span2+span2)
  t0rows.push(new TableRow({height:{value:450,rule:HeightRule.AT_LEAST},children:[
    mkCell("履　歴　書",W0+W1,{cs:2,bold:true,size:36,font:F}),
    mkCell(`${yy}年　${mm}月　${dd}日現在`,W2+W3+W4+W5,{cs:4,right:true,size:20})
  ]}));

  // Row 1: ふりがな + name reading + PHOTO (rowSpan 2)
  const photoW=W4+W5; // right side for photo
  const nameW=W1+W2+W3; // middle cols for name
  t0rows.push(new TableRow({height:{value:194,rule:HeightRule.AT_LEAST},children:[
    mkCell("ふりがな",W0,{size:16}),
    mkCell(data.furigana||'',nameW,{cs:3,size:18}),
    photoBlob?new TableCell({width:{size:photoW,type:WidthType.DXA},borders,verticalAlign:VerticalAlign.CENTER,rowSpan:2,columnSpan:2,children:[
      new Paragraph({alignment:AlignmentType.CENTER,children:[new ImageRun({data:photoBlob,transformation:{width:90,height:120},type:'png'})]})
    ]}):mkCell("写真\n(3×4cm)",photoW,{cs:2,rs:2,center:true,size:16,color:"999999"})
  ]}));

  // Row 2: 氏名 + full name (photo continues via rowSpan)
  t0rows.push(new TableRow({height:{value:491,rule:HeightRule.AT_LEAST},children:[
    mkCell("氏　名",W0,{bold:true,size:18}),
    mkCell(data.fullname||'',nameW,{cs:3,size:28,bold:true,font:F2})
  ]}));

  // Row 3: 生年月日 (span 3~5 cols) + 性別
  const dobStr=data.dob?(()=>{const d=new Date(data.dob);const age=yy-d.getFullYear();return`${d.getFullYear()}年　${String(d.getMonth()+1).padStart(2,'0')}月　${String(d.getDate()).padStart(2,'0')}日生 （満${age}歳）`;})():'';
  const genderVal=(data.gender||'').replace(/ .*/,'');
  const genderJp=genderVal==='男'||genderVal==='Male'||genderVal==='Nam'?'男性':genderVal==='女'||genderVal==='Female'||genderVal==='Nữ'?'女性':genderVal;
  t0rows.push(new TableRow({height:{value:324,rule:HeightRule.AT_LEAST},children:[
    mkCell(dobStr,W0+W1+W2+W3+W4,{cs:5,size:20}),
    mkCell(`性別　${genderJp}`,W5,{size:20,center:true})
  ]}));

  // Row 4: 現住所 label with postcode (span all 6)
  t0rows.push(new TableRow({height:{value:216,rule:HeightRule.AT_LEAST},children:[
    mkCell(`現住所（〒${data.postcode||'　　　-　　　'}）`,TW,{cs:6,size:18})
  ]}));

  // Row 5: Address detail (span all 6)
  t0rows.push(new TableRow({height:{value:364,rule:HeightRule.AT_LEAST},children:[
    mkCell(data.address||'',TW,{cs:6,size:20})
  ]}));

  // Row 6: 在留資格 (span all 6)
  const veStr=data.visa_exp?(()=>{const d=new Date(data.visa_exp);return`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`;})():'';
  t0rows.push(new TableRow({height:{value:358,rule:HeightRule.AT_LEAST},children:[
    mkCell(`在留資格　　${data.visa||''}（${veStr}）`,TW,{cs:6,size:20})
  ]}));

  // Row 7: 国籍 | value | 配偶者 (span3) | 扶養者
  const sv2=(data.spouse||'').includes('有')||(data.spouse||'').includes('Có')?'有':'無';
  const dv2=(data.dependents||'').includes('有')||(data.dependents||'').includes('Có')?'有':'無';
  t0rows.push(new TableRow({height:{value:389,rule:HeightRule.AT_LEAST},children:[
    mkCell("国籍",W0,{size:18}),
    mkCell(data.nationality||'',W1,{size:20}),
    mkCell(`配偶者:　${sv2}`,W2+W3+W4,{cs:3,size:20}),
    mkCell(`扶養者:　${dv2}`,W5,{size:20})
  ]}));

  // Row 8: Empty separator (span all 6)
  t0rows.push(new TableRow({height:{value:180,rule:HeightRule.AT_LEAST},children:[
    mkCell("",TW,{cs:6,size:8})
  ]}));

  // Row 9: Header — 開始年月 | 終了年月 | 学歴・職歴
  t0rows.push(new TableRow({height:{value:276,rule:HeightRule.AT_LEAST},children:[
    mkCell("開始年月",W0,{bold:true,size:18,center:true}),
    mkCell("終了年月",W1,{bold:true,size:18,center:true}),
    mkCell("学　歴 ・ 職　歴（各別にまとめて書く）",W2+W3+W4+W5,{cs:4,bold:true,size:18,center:true})
  ]}));

  // Row 10: 学歴 label
  t0rows.push(new TableRow({height:{value:271,rule:HeightRule.AT_LEAST},children:[
    mkCell("",W0,{size:18}),mkCell("",W1,{size:18}),
    mkCell("学歴",W2+W3+W4+W5,{cs:4,center:true,bold:true,size:20})
  ]}));

  // Education rows
  eduRows.filter(r=>r.detail).forEach(r=>{
    t0rows.push(new TableRow({height:{value:417,rule:HeightRule.AT_LEAST},children:[
      mkCell(r.start?r.start.replace('/','年')+'月':'',W0,{center:true,size:18}),
      mkCell(r.end?r.end.replace('/','年')+'月':'',W1,{center:true,size:18}),
      mkCell(r.detail,W2+W3+W4+W5,{cs:4,size:20})
    ]}));
  });

  // 以上 for education
  t0rows.push(new TableRow({height:{value:364,rule:HeightRule.AT_LEAST},children:[
    mkCell("",W0),mkCell("",W1),
    mkCell("以上",W2+W3+W4+W5,{cs:4,right:true,size:18})
  ]}));

  // 職歴 label
  t0rows.push(new TableRow({height:{value:229,rule:HeightRule.AT_LEAST},children:[
    mkCell("",W0),mkCell("",W1),
    mkCell("職歴",W2+W3+W4+W5,{cs:4,center:true,bold:true,size:20})
  ]}));

  // Work rows — include country prefix and visa like template
  workRows.filter(r=>r.detail).forEach(r=>{
    const endVal=r.end===t('current')||r.end==='現在'?'現在':r.end?r.end.replace('/','年')+'月':'';
    const countryPrefix=r.country==='jp'?'（日本）':r.country==='other'?'':'（'+((data.nationality||'').replace(/\s*\d+.*/,'')|| '')+'）';
    const visaSuffix=r.country==='jp'&&r.visa?'（'+r.visa+'）':'';
    const workText=countryPrefix+r.detail+(visaSuffix?'\n'+visaSuffix:'');
    t0rows.push(new TableRow({height:{value:645,rule:HeightRule.AT_LEAST},children:[
      mkCell(r.start?r.start.replace('/','年')+'月':'',W0,{center:true,size:18}),
      mkCell(endVal,W1,{center:true,size:18}),
      mkCell(workText,W2+W3+W4+W5,{cs:4,size:20})
    ]}));
  });

  // 以上 for work
  t0rows.push(new TableRow({height:{value:401,rule:HeightRule.AT_LEAST},children:[
    mkCell("",W0),mkCell("",W1),
    mkCell("以上",W2+W3+W4+W5,{cs:4,right:true,size:18})
  ]}));

  DC.push(new Table({rows:t0rows,width:{size:TW,type:WidthType.DXA}}));
  DC.push(new Paragraph({spacing:{after:60},children:[]}));

  // ============================================================
  //  TABLE 1: 免許・資格 (matching template: col0=1843, col1=8647)
  // ============================================================
  const LW0=1843,LW1=8647,lR=[];

  lR.push(new TableRow({height:{value:250,rule:HeightRule.AT_LEAST},children:[
    mkCell("年",LW0,{bold:true,size:18,center:true}),
    mkCell("免　許 ・ 資　格",LW1,{bold:true,size:18,center:true})
  ]}));

  licRows.filter(r=>r.detail).forEach(r=>{
    let dt=r.detail||'';
    if(!/合格|不合格|判定|取得/.test(dt)&&dt) dt+='　　　　　　　　　　　　　合格';
    lR.push(new TableRow({height:{value:458,rule:HeightRule.AT_LEAST},children:[
      mkCell(r.date?r.date.replace('/','年')+'月':'',LW0,{center:true,size:18}),
      mkCell(dt,LW1,{size:20})
    ]}));
  });

  lR.push(new TableRow({height:{value:424,rule:HeightRule.AT_LEAST},children:[
    mkCell("",LW0),mkCell("以上",LW1,{right:true,size:18})
  ]}));

  // Empty bottom row like template
  lR.push(new TableRow({height:{value:226,rule:HeightRule.AT_LEAST},children:[
    mkCell("",LW0),mkCell("",LW1)
  ]}));

  DC.push(new Table({rows:lR,width:{size:TW,type:WidthType.DXA}}));
  DC.push(new Paragraph({spacing:{after:60},children:[]}));

  // ============================================================
  //  TABLE 2: 備考 (matching template: col0=1838, col1=8647)
  // ============================================================
  DC.push(new Table({rows:[new TableRow({height:{value:665,rule:HeightRule.AT_LEAST},children:[
    mkCell("備考",1838,{bold:true,size:18,vtop:true}),
    mkCell(data.remarks||'',8652,{size:20,vtop:true})
  ]})],width:{size:TW,type:WidthType.DXA}}));

  // ============================================================
  //  Attached images: 在留カード + certificates
  // ============================================================
  const allImgSections=[];
  if(zairyuFront.length||zairyuBack.length){
    allImgSections.push(new Paragraph({spacing:{before:300,after:100},children:[new TextRun({text:"在留カード（写真）",bold:true,size:24,font:F})]}));
    for(const f of [...zairyuFront,...zairyuBack]){
      if(f.data.startsWith('data:image/')){
        const ab=await imgBlob(f.data);
        if(ab)allImgSections.push(new Paragraph({spacing:{after:100},children:[new ImageRun({data:ab,transformation:{width:300,height:190},type:'png'})]}));
      } else {
        allImgSections.push(new Paragraph({spacing:{after:60},children:[new TextRun({text:`※ 添付ファイル: ${f.name}`,size:18,font:F,italics:true,color:"666666"})]}));
      }
    }
  }

  const certLabels={certSenmon:'専門級',certLicense:'運転免許',certJlpt:'日本語証明書',certTokutei:'特定技能',certOther:'その他'};
  for(const[key,arr] of Object.entries(certFiles)){
    if(!arr.length)continue;
    allImgSections.push(new Paragraph({spacing:{before:200,after:80},children:[new TextRun({text:`${certLabels[key]||key}`,bold:true,size:22,font:F})]}));
    for(const f of arr){
      if(f.data.startsWith('data:image/')){
        const ab=await imgBlob(f.data);
        if(ab)allImgSections.push(new Paragraph({spacing:{after:80},children:[new ImageRun({data:ab,transformation:{width:280,height:180},type:'png'})]}));
      } else {
        allImgSections.push(new Paragraph({spacing:{after:40},children:[new TextRun({text:`※ 添付ファイル: ${f.name}`,size:18,font:F,italics:true,color:"666666"})]}));
      }
    }
  }

  if(allImgSections.length) DC.push(...allImgSections);

  DC.push(new Paragraph({spacing:{before:200},children:[new TextRun({text:"YourBright Co., Ltd.",size:16,font:F,color:"888888"})]}));

  return await Packer.toBlob(new Document({sections:[{properties:{page:{size:{width:11906,height:16838},margin:{top:567,right:567,bottom:567,left:567}}},children:DC}]}));
}

// =========================================================
//  ZIP + ACTIONS
// =========================================================
function d2b(dataUrl){const p=dataUrl.split(',');const m=p[0].match(/:(.*?);/)[1];const b=atob(p[1]);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:m});}
function gExt(name){const e=name.split('.').pop().toLowerCase();return['jpg','jpeg','png','gif','webp','pdf','doc','docx'].includes(e)?e:'bin';}

async function createZip(){
  const zip=new JSZip(),nm=(data.fullname||'profile').replace(/\s+/g,'_'),ds=new Date().toISOString().slice(0,10);
  const wordBlob=await generateWord();
  zip.file(`履歴書_${nm}_${ds}.docx`,wordBlob);
  const folder=zip.folder(`写真_${nm}`);
  if(photoData)folder.file(`証明写真_3x4.jpg`,d2b(photoData));
  zairyuFront.forEach((f,i)=>folder.file(`在留カード_表_${i+1}.${gExt(f.name)}`,d2b(f.data)));
  zairyuBack.forEach((f,i)=>folder.file(`在留カード_裏_${i+1}.${gExt(f.name)}`,d2b(f.data)));
  const certNames={certSenmon:'専門級',certLicense:'運転免許',certJlpt:'日本語_JLPT',certTokutei:'特定技能',certOther:'その他'};
  Object.entries(certFiles).forEach(([k,arr])=>{arr.forEach((f,i)=>folder.file(`${certNames[k]||k}_${i+1}.${gExt(f.name)}`,d2b(f.data)));});
  return await zip.generateAsync({type:'blob'});
}

async function doDownloadZip(){
  showLoading();
  try{const z=await createZip();const nm=(data.fullname||'profile').replace(/\s+/g,'_');saveAs(z,`履歴書_${nm}_${new Date().toISOString().slice(0,10)}.zip`);hideLoading();showSuccess();}
  catch(e){hideLoading();alert('Error: '+e.message);console.error(e);}
}
async function doEmailZip(){
  const sel=getSelectedEmails();if(!sel.length){alert('Please select email!');return;}
  showLoading();
  try{const z=await createZip();const nm=(data.fullname||'profile').replace(/\s+/g,'_');saveAs(z,`履歴書_${nm}_${new Date().toISOString().slice(0,10)}.zip`);hideLoading();
  const s=encodeURIComponent(`履歴書 - ${data.fullname||''}`);
  const b=encodeURIComponent(`履歴書を送付いたします。\n\n氏名: ${data.fullname||'-'}\n国籍: ${data.nationality||'-'}\n\n※ ZIPファイルを添付してください\n\n---\nYourBright Co., Ltd.`);
  window.open(`mailto:${sel.join(',')}?subject=${s}&body=${b}`,'_blank');
  setTimeout(()=>alert(t('emailReady')),500);showSuccess();}
  catch(e){hideLoading();alert('Error: '+e.message);console.error(e);}
}
function showSuccess(){document.getElementById('reviewArea').classList.add('hidden');document.getElementById('successArea').classList.remove('hidden');}
function restart(){data={};photoData=null;zairyuFront=[];zairyuBack=[];certFiles={certSenmon:[],certLicense:[],certJlpt:[],certTokutei:[],certOther:[]};eduRows=[{start:'',end:'',detail:''}];workRows=[{start:'',end:'',country:'home',visa:'',detail:''}];licRows=[{date:'',detail:''}];step=0;document.getElementById('successArea').classList.add('hidden');document.getElementById('welcomeScreen').classList.remove('hidden');document.getElementById('langSection').classList.remove('hidden');document.getElementById('progressSection').classList.add('hidden');document.getElementById('navButtons').classList.add('hidden');updateUI();}
