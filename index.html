<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:840px;width:100%;overflow:hidden}
.header{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);color:#fff;padding:22px 32px;text-align:center}
.logo{font-size:26px;font-weight:800;letter-spacing:1px;margin-bottom:4px}.logo span{color:#ffd54f}
.header h1{font-size:19px;margin-bottom:2px}.header p{font-size:11px;opacity:.8}

.lang-select{padding:14px 32px;border-bottom:1px solid #e0e0e0}
.lang-select label{font-weight:600;font-size:12px;color:#333;display:block;margin-bottom:8px}
.lang-grid{display:flex;flex-wrap:wrap;gap:5px}
.lang-btn{padding:6px 12px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:11px;background:#fff;transition:.2s}
.lang-btn:hover{border-color:#667eea;background:#f5f3ff}
.lang-btn.active{border-color:#667eea;background:#667eea;color:#fff}

.progress-bar{padding:10px 32px;border-bottom:1px solid #eee}
.progress-track{height:6px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:4px;transition:width .4s}
.progress-text{font-size:11px;color:#888;margin-top:3px;text-align:right}

.form-body{padding:22px 32px;min-height:350px}
.question-card{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-number{font-size:11px;color:#667eea;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.q-title{font-size:16px;font-weight:700;color:#1a237e;margin-bottom:2px}
.q-title-jp{font-size:12px;color:#666;margin-bottom:3px}
.q-subtitle{font-size:12px;color:#999;margin-bottom:10px}
.q-input{width:100%;padding:11px 13px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;transition:.2s;outline:none;font-family:inherit}
.q-input:focus{border-color:#667eea}
textarea.q-input{min-height:80px;resize:vertical}
select.q-input{cursor:pointer;appearance:auto}
.q-input::placeholder{color:#bbb}

/* Hint box */
.hint-box{background:#fff8e1;border-left:4px solid #ffc107;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:12px;color:#6d4c00;line-height:1.6}
.hint-box b{color:#e65100}

.dynamic-section{margin-top:8px}
.dynamic-row{display:grid;grid-template-columns:120px 120px 1fr 32px;gap:6px;margin-bottom:7px;align-items:start}
.dynamic-row input,.dynamic-row textarea{padding:9px;border:2px solid #e0e0e0;border-radius:8px;font-size:12px;outline:none;font-family:inherit;transition:.2s}
.dynamic-row input:focus,.dynamic-row textarea:focus{border-color:#667eea}
.dynamic-row textarea{min-height:38px;resize:vertical}
.btn-add-row{padding:7px 14px;background:#f5f3ff;border:2px dashed #667eea;border-radius:8px;color:#667eea;font-size:12px;cursor:pointer;margin-top:4px;display:inline-block;font-weight:600}
.btn-add-row:hover{background:#667eea;color:#fff}
.btn-remove-row{width:28px;height:28px;border-radius:50%;border:none;background:#fee;color:#f44;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:2px}
.btn-remove-row:hover{background:#f44;color:#fff}
.row-labels{display:grid;grid-template-columns:120px 120px 1fr 32px;gap:6px;margin-bottom:3px;font-size:10px;color:#888;font-weight:600}

/* Photo / file uploads */
.photo-upload{display:flex;align-items:center;gap:14px;margin-top:8px}
.photo-preview{width:110px;height:140px;border:2px dashed #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fafafa;flex-shrink:0}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{text-align:center;color:#bbb;font-size:10px;padding:6px}

.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.upload-card{border:2px dashed #ddd;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:.2s;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa}
.upload-card:hover{border-color:#667eea;background:#f8f7ff}
.upload-card.has-file{border-color:#4caf50;background:#f1f8e9}
.upload-card .upload-icon{font-size:28px;margin-bottom:6px}
.upload-card .upload-label{font-size:11px;color:#555;font-weight:600;line-height:1.4}
.upload-card .upload-status{font-size:10px;color:#4caf50;margin-top:4px;font-weight:600}
.upload-card img{max-width:80px;max-height:60px;object-fit:contain;border-radius:4px;margin-top:4px}
.upload-card input{position:absolute;inset:0;opacity:0;cursor:pointer}

.btn-row{display:flex;justify-content:space-between;padding:12px 32px 20px;gap:10px}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-prev{background:#f0f0f0;color:#555}.btn-prev:hover{background:#e0e0e0}
.btn-next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;margin-left:auto}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}

.review-table{width:100%;border-collapse:collapse;margin-top:8px}
.review-table th,.review-table td{padding:7px 10px;text-align:left;border-bottom:1px solid #eee;font-size:11px;vertical-align:top}
.review-table th{background:#f8f7ff;color:#1a237e;font-weight:600;width:30%;white-space:nowrap}
.review-table td{color:#333;word-break:break-word}
.review-photo{width:70px;height:90px;object-fit:cover;border-radius:4px}
.review-thumb{width:50px;height:40px;object-fit:cover;border-radius:3px;margin:2px}

.email-list{margin:10px 0}
.email-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:.2s}
.email-item:hover{background:#f8f7ff}
.email-item input[type="checkbox"]{width:16px;height:16px;accent-color:#667eea}
.email-item label{cursor:pointer;font-size:12px;color:#333}

.final-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;justify-content:center}
.btn-action{padding:11px 20px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.btn-download{background:#4caf50;color:#fff}.btn-download:hover{background:#43a047}
.btn-email{background:#1a237e;color:#fff}.btn-email:hover{background:#283593}
.btn-restart{background:#f44336;color:#fff}.btn-restart:hover{background:#e53935}
.btn-disabled{opacity:.5;pointer-events:none}

.success-msg{text-align:center;padding:36px 20px}
.success-icon{font-size:52px;margin-bottom:12px}
.success-msg h2{color:#1a237e;margin-bottom:6px}
.success-msg p{color:#666;font-size:13px}

.welcome{text-align:center;padding:34px 20px}
.welcome h2{color:#1a237e;font-size:18px;margin-bottom:8px}
.welcome p{color:#666;font-size:12px;line-height:1.6;max-width:520px;margin:0 auto 18px}
.btn-start{padding:12px 36px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(102,126,234,.4)}

/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999}
.loading-box{background:#fff;border-radius:16px;padding:32px 40px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{color:#333;font-size:14px;font-weight:600}
.loading-box .sub{color:#888;font-size:11px;margin-top:4px}

.hidden{display:none!important}
@media(max-width:600px){
  .container{border-radius:0}
  .header,.form-body,.btn-row,.lang-select,.progress-bar{padding-left:14px;padding-right:14px}
  .dynamic-row{grid-template-columns:1fr 1fr;gap:5px}
  .dynamic-row textarea{grid-column:1/-1}
  .btn-remove-row{grid-column:2;justify-self:end}
  .row-labels{display:none}
  .upload-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">Your<span>Bright</span></div>
    <h1 id="headerTitle">履歴書</h1>
    <p id="headerSub">Personal Profile Form</p>
  </div>

  <div class="lang-select" id="langSection">
    <label>🌐 Chọn ngôn ngữ / Select Language / 言語を選択:</label>
    <div class="lang-grid">
      <button class="lang-btn active" onclick="setLang('vi',this)">🇻🇳 Tiếng Việt</button>
      <button class="lang-btn" onclick="setLang('id',this)">🇮🇩 Indonesia</button>
      <button class="lang-btn" onclick="setLang('km',this)">🇰🇭 ខ្មែរ</button>
      <button class="lang-btn" onclick="setLang('ne',this)">🇳🇵 नेपाली</button>
      <button class="lang-btn" onclick="setLang('mn',this)">🇲🇳 Монгол</button>
      <button class="lang-btn" onclick="setLang('zh',this)">🇨🇳 中文</button>
      <button class="lang-btn" onclick="setLang('my',this)">🇲🇲 မြန်မာ</button>
      <button class="lang-btn" onclick="setLang('th',this)">🇹🇭 ไทย</button>
      <button class="lang-btn" onclick="setLang('bn',this)">🇧🇩 বাংলা</button>
    </div>
  </div>

  <div class="progress-bar hidden" id="progressSection">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="form-body" id="formBody">
    <div class="welcome" id="welcomeScreen">
      <h2 id="welcomeTitle"></h2>
      <p id="welcomeDesc"></p>
      <button class="btn-start" id="btnStart" onclick="startForm()"></button>
    </div>
    <div class="question-card hidden" id="questionArea"></div>
    <div class="hidden" id="reviewArea"></div>
    <div class="success-msg hidden" id="successArea">
      <div class="success-icon">✅</div>
      <h2 id="successTitle"></h2>
      <p id="successDesc"></p>
      <div class="final-actions">
        <button class="btn-action btn-download" onclick="doDownloadZip()">📥 <span id="btnDL2"></span></button>
        <button class="btn-action btn-email" onclick="doEmailZip()">📧 <span id="btnEM2"></span></button>
        <button class="btn-action btn-restart" onclick="restart()">🔄 <span id="btnRS2"></span></button>
      </div>
    </div>
  </div>

  <div class="btn-row hidden" id="navButtons">
    <button class="btn btn-prev hidden" id="btnPrev" onclick="prevQuestion()"></button>
    <button class="btn btn-next" id="btnNext" onclick="nextQuestion()"></button>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <p id="loadingText">Đang tạo file...</p>
    <div class="sub" id="loadingSub">Vui lòng đợi</div>
  </div>
</div>

function getOpts(type){
  if(type==='gender')return[t('male'),t('female'),t('other')];

function showStep(){
  const f=FIELDS[step];
  const area=document.getElementById('questionArea');
  document.getElementById('progressFill').style.width=((step+1)/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=`${step+1} / ${TOTAL}`;
  document.getElementById('btnPrev').classList.toggle('hidden',step===0);
  document.getElementById('btnPrev').textContent=t('prev');
  document.getElementById('btnNext').textContent=step===TOTAL-1?t('submit'):t('next');

  const fieldLabel=t(f.key);
  const saved=data[f.key]||'';
  let html=`<div class="q-number">${t('qLabel')} ${step+1} / ${TOTAL}</div><div class="q-title">${fieldLabel}</div><div class="q-title-jp">${f.jp}</div><div style="height:6px"></div>`;

  if(f.type==='text'||f.type==='tel'||f.type==='email'){
    html+=`<input type="${f.type}" class="q-input" id="qInput" value="${saved}">`;
  }else if(f.type==='date'){
    html+=`<input type="date" class="q-input" id="qInput" value="${saved}">`;
  }else if(f.type==='select'){
    const opts=getOpts(f.opts);
    html+=`<select class="q-input" id="qInput"><option value="">--</option>${opts.map(o=>`<option value="${o}"${saved===o?' selected':''}>${o}</option>`).join('')}</select>`;
  }else if(f.type==='textarea'){
    html+=`<textarea class="q-input" id="qInput" rows="4">${saved}</textarea>`;
  }else if(f.type==='photo'){
    html+=`<div class="photo-upload"><div class="photo-preview" id="photoPreview">${photoData?`<img src="${photoData}">`:`<div class="photo-placeholder">${t('uploadPhoto')}</div>`}</div><div><input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handleMainPhoto(this)"><button class="btn btn-next" onclick="document.getElementById('photoInput').click()" style="font-size:11px;padding:8px 16px">📷 ${t('uploadPhoto')}</button></div></div>`;
  }else if(f.type==='photo_zairyu'){
    html+=buildZairyuUpload();
  }else if(f.type==='dynamic_edu'){
    html+=buildDynamicEdu();
  }else if(f.type==='dynamic_work'){
    html+=buildDynamicWork();
  }else if(f.type==='dynamic_license'){
    html+=buildDynamicLicense();
  }else if(f.type==='cert_upload'){
    html+=buildCertUpload();
  }

  area.innerHTML=html;
  const inp=document.getElementById('qInput');
  if(inp){setTimeout(()=>inp.focus(),80);if(f.type!=='textarea')inp.addEventListener('keydown',e=>{if(e.key==='Enter')nextQuestion()});}
}

// ===== FILE PREVIEW HELPER =====
// Store file names for non-image files
let fileNames={};
function isImage(dataUrl){return dataUrl && dataUrl.startsWith('data:image/');}
function filePreview(dataUrl,key,label){
  if(!dataUrl) return '';
  if(isImage(dataUrl)) return `<img src="${dataUrl}">`;
  // Non-image file: show icon + filename
  const name=fileNames[key]||'file';
  const ext=name.split('.').pop().toLowerCase();
  const icon=ext==='pdf'?'📄':ext==='doc'||ext==='docx'?'📝':'📎';
  return `<div style="font-size:24px">${icon}</div><div style="font-size:10px;color:#333;word-break:break-all;max-width:90px">${name}</div>`;
}

// ===== ZAIRYU CARD UPLOAD =====
function buildZairyuUpload(){
  return `<div class="q-subtitle">${t('zairyu')}</div>
  <div class="upload-grid">
    <div class="upload-card ${zairyuFront?'has-file':''}" onclick="this.querySelector('input').click()">
      <input type="file" accept="image/*,.pdf,.doc,.docx" onchange="handleZairyu('front',this)">
      ${zairyuFront?`${filePreview(zairyuFront,'zairyuFront',t('zairyuFront'))}<div class="upload-status">${t('uploaded')}</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuFront')}<br><small>${t('uploadClick')}</small></div>`}
    </div>
    <div class="upload-card ${zairyuBack?'has-file':''}" onclick="this.querySelector('input').click()">
      <input type="file" accept="image/*,.pdf,.doc,.docx" onchange="handleZairyu('back',this)">
      ${zairyuBack?`${filePreview(zairyuBack,'zairyuBack',t('zairyuBack'))}<div class="upload-status">${t('uploaded')}</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuBack')}<br><small>${t('uploadClick')}</small></div>`}
    </div>
  </div>`;
}

function handleZairyu(side,input){
  const file=input.files[0];if(!file)return;
  const key=side==='front'?'zairyuFront':'zairyuBack';
  fileNames[key]=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    if(side==='front')zairyuFront=e.target.result;
    else zairyuBack=e.target.result;
    showStep();
  };
  reader.readAsDataURL(file);
}

// ===== CERT UPLOAD =====
function buildCertUpload(){
  const certs=[
    {key:'certSenmon',label:t('certSenmon'),icon:'📜',data:certSenmon},
    {key:'certLicense',label:t('certLicense'),icon:'🚗',data:certLicense},
    {key:'certJlpt',label:t('certJlpt'),icon:'🇯🇵',data:certJlpt},
    {key:'certTokutei',label:t('certTokutei'),icon:'🏭',data:certTokutei},
  ];
  let h=`<div class="q-subtitle">${t('cert_photos')}</div><div class="upload-grid">`;
  certs.forEach(c=>{
    h+=`<div class="upload-card ${c.data?'has-file':''}" onclick="this.querySelector('input').click()">
      <input type="file" accept="image/*,.pdf,.doc,.docx" onchange="handleCert('${c.key}',this)">
      ${c.data?`${filePreview(c.data,c.key,c.label)}<div class="upload-status">${c.label}<br>${t('uploaded')}</div>`:`<div class="upload-icon">${c.icon}</div><div class="upload-label">${c.label}<br><small>${t('uploadClick')}</small></div>`}
    </div>`;
  });
  h+='</div>';
  return h;

function handleCert(key,input){
  const file=input.files[0];if(!file)return;
  fileNames[key]=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    if(key==='certSenmon')certSenmon=e.target.result;
    else if(key==='certLicense')certLicense=e.target.result;
    else if(key==='certJlpt')certJlpt=e.target.result;
    else if(key==='certTokutei')certTokutei=e.target.result;
    showStep();
  };
  reader.readAsDataURL(file);
}

function handleMainPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{photoData=e.target.result;data.photo='[PHOTO]';showStep();};
  reader.readAsDataURL(file);
}

// =========================================================
//  WORD GENERATION (JIS 履歴書)
// =========================================================
async function generateWord(){
  const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,BorderStyle,ImageRun,VerticalAlign}=docx;
  const bdr={style:BorderStyle.SINGLE,size:1,color:"000000"};
  const noBdr={style:BorderStyle.NONE,size:0,color:"FFFFFF"};
  const borders={top:bdr,bottom:bdr,left:bdr,right:bdr};
  const noBorders={top:noBdr,bottom:noBdr,left:noBdr,right:noBdr};
  const F="Yu Gothic";
  const TW=9600; // total table width in DXA (≈17cm A4)

  // Helper: create a table cell
  function C(text,w,opts={}){
    const lines=(text||'').split('\n');
    const pars=lines.map(line=>new Paragraph({
      alignment:opts.center?AlignmentType.CENTER:opts.right?AlignmentType.RIGHT:AlignmentType.LEFT,
      spacing:{before:30,after:30},
      children:[new TextRun({text:line,bold:!!opts.bold,size:opts.size||20,font:F,color:opts.color||"000000"})]
    }));
    return new TableCell({
      width:{size:w,type:WidthType.DXA},
      borders:opts.noBorders?noBorders:borders,
      verticalAlign:VerticalAlign.CENTER,
      children:pars,
      columnSpan:opts.cs,
      rowSpan:opts.rs,
    });
  }

  // Date helper
  const today=new Date();
  const yy=today.getFullYear(), mm=String(today.getMonth()+1).padStart(2,'0'), dd=String(today.getDate()).padStart(2,'0');
  const dateStr=`${yy}年　${mm}月　${dd}日現在`;

  // ── Photo blob (if exists) ──
  let photoBlob=null;
  if(photoData){
    try{const r=await fetch(photoData);photoBlob=await r.arrayBuffer();}catch(e){}
  }

  const DC=[]; // doc children

  // ━━━━━ TITLE ROW ━━━━━
  // "履　歴　書" big left, date on right — use a 2-col invisible table
  DC.push(new Table({rows:[new TableRow({children:[
    new TableCell({width:{size:4800,type:WidthType.DXA},borders:noBorders,children:[
      new Paragraph({spacing:{after:60},children:[new TextRun({text:"履　歴　書",bold:true,size:40,font:F})]})
    ]}),
    new TableCell({width:{size:4800,type:WidthType.DXA},borders:noBorders,verticalAlign:VerticalAlign.BOTTOM,children:[
      new Paragraph({alignment:AlignmentType.RIGHT,spacing:{after:60},children:[new TextRun({text:dateStr,size:20,font:F})]})
    ]}),
  ]})],width:{size:TW,type:WidthType.DXA}}));

  DC.push(new Paragraph({spacing:{after:40},children:[]}));

  // ━━━━━ TOP SECTION: Personal info + Photo ━━━━━
  // Layout: 5 columns [label 1400 | content 3800 | label 900 | content 1200 | photo 2300]
  // Photo spans multiple rows on the right
  const L1=1400, C1=3800, L2=900, C2=1200, PH=2300;
  const topRows=[];

  // Row 1: ふりがな | value ————————————————————————— | [photo rowspan]
  topRows.push(new TableRow({children:[
    C("ふりがな",L1,{size:16}),
    C(data.furigana||'',C1+L2+C2,{cs:3,size:18}),
    // Photo cell - spans 3 rows
    photoBlob
      ? new TableCell({width:{size:PH,type:WidthType.DXA},borders,verticalAlign:VerticalAlign.CENTER,rowSpan:3,
          children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new ImageRun({data:photoBlob,transformation:{width:85,height:113},type:'png'})]})]})
      : C("写真",PH,{center:true,rs:3,size:16,color:"999999"}),
  ]}));

  // Row 2: 氏名 | value
  topRows.push(new TableRow({height:{value:500,rule:'atLeast'},children:[
    C("氏　名",L1,{bold:true}),
    C(data.fullname||'',C1+L2+C2,{cs:3,size:26,bold:true}),
  ]}));

  // Row 3: 生年月日 | value | 性別 | value
  const dobStr=data.dob?(()=>{const d=new Date(data.dob);const age=yy-d.getFullYear();return`${d.getFullYear()}年　${String(d.getMonth()+1).padStart(2,'0')}月　${String(d.getDate()).padStart(2,'0')}日生　（満${age}歳）`;})():'';
  topRows.push(new TableRow({children:[
    C("生年月日",L1,{size:16}),
    C(dobStr,C1,{size:18}),
    C("性別",L2,{size:16,center:true}),
    C((data.gender||'').replace(/ .*/,''),C2,{center:true}),
  ]}));

  // Row 4: 現住所 (〒...) | full width
  topRows.push(new TableRow({children:[
    C("現住所",L1,{size:16}),
    C(`（〒${data.postcode||''}）\n${data.address||''}`,C1+L2+C2+PH,{cs:4}),
  ]}));

  // Row 5: 在留資格
  const visaExpStr=data.visa_exp?(()=>{const d=new Date(data.visa_exp);return`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`;})():data.visa_exp||'';
  topRows.push(new TableRow({children:[
    C("在留資格",L1,{size:16}),
    C(`${data.visa||''}（${visaExpStr}）`,C1+L2+C2+PH,{cs:4}),
  ]}));

  // Row 6: 国籍 | value | 配偶者: X | 扶養者: X
  const sv=(data.spouse||'').includes('有')||(data.spouse||'').includes('Yes')||(data.spouse||'').includes('Có')?'有':'無';
  const dv=(data.dependents||'').includes('有')||(data.dependents||'').includes('Yes')||(data.dependents||'').includes('Có')?'有':'無';
  topRows.push(new TableRow({children:[
    C("国籍",L1,{size:16}),
    C(data.nationality||'',C1,{}),
    C("配偶者：",L2,{size:16}),
    C(sv,C2,{center:true}),
    new TableCell({width:{size:PH,type:WidthType.DXA},borders,verticalAlign:VerticalAlign.CENTER,children:[
      new Paragraph({children:[new TextRun({text:`扶養者：　${dv}`,size:20,font:F})]})
    ]}),
  ]}));

  DC.push(new Table({rows:topRows,width:{size:TW,type:WidthType.DXA}}));
  DC.push(new Paragraph({spacing:{after:100},children:[]}));

  // ━━━━━ 学歴・職歴 TABLE ━━━━━
  const HW1=1500, HW2=1500, HW3=6600; // 開始年月 | 終了年月 | 内容
  const hR=[];

  // Header
  hR.push(new TableRow({children:[
    C("開始年月",HW1,{bold:true,size:18,center:true}),
    C("終了年月",HW2,{bold:true,size:18,center:true}),
    C("学　歴　・　職　歴（各別にまとめて書く）",HW3,{bold:true,size:18,center:true}),
  ]}));

  // 学歴 label
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("学歴",HW3,{center:true,bold:true})]}));

  // Education entries
  eduRows.filter(r=>r.detail).forEach(r=>{
    hR.push(new TableRow({children:[
      C(r.start?`${r.start.replace('/',  '年')}月`:'',HW1,{center:true}),
      C(r.end?`${r.end.replace('/','年')}月`:'',HW2,{center:true}),
      C(r.detail,HW3),
    ]}));
  });

  // Empty row + 以上
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("",HW3)]}));
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("以上",HW3,{right:true,size:18})]}));

  // 職歴 label
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("職歴",HW3,{center:true,bold:true})]}));

  // Work entries
  workRows.filter(r=>r.detail).forEach(r=>{
    hR.push(new TableRow({children:[
      C(r.start?`${r.start.replace('/','年')}月`:'',HW1,{center:true}),
      C(r.end==='現在'||r.end===t('current')?'現在':r.end?`${r.end.replace('/','年')}月`:'',HW2,{center:true}),
      C(r.detail,HW3),
    ]}));
  });

  // Empty row + 以上
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("",HW3)]}));
  hR.push(new TableRow({children:[C("",HW1),C("",HW2),C("以上",HW3,{right:true,size:18})]}));

  DC.push(new Table({rows:hR,width:{size:TW,type:WidthType.DXA}}));
  DC.push(new Paragraph({spacing:{after:100},children:[]}));

  // ━━━━━ 免許・資格 TABLE ━━━━━
  // Format from PDF: 年 | 免許・資格 name ... 合格
  const LW1=1500, LW2=8100;
  const lR=[];
  lR.push(new TableRow({children:[
    C("年",LW1,{bold:true,size:18,center:true}),
    C("免　許　・　資　格",LW2,{bold:true,size:18,center:true}),
  ]}));

  licRows.filter(r=>r.detail).forEach(r=>{
    const dateFormatted=r.date?`${r.date.replace('/','年')}月`:'';
    // Add 合格 at the end of detail if not already present
    let detailText=r.detail||'';
    const hasResult=/合格|不合格|判定|取得/.test(detailText);
    if(!hasResult && detailText) detailText+='　　　　　　　合格';
    lR.push(new TableRow({children:[
      C(dateFormatted,LW1,{center:true}),
      C(detailText,LW2),
    ]}));
  });

  // Empty rows for formatting + 以上
  lR.push(new TableRow({children:[C("",LW1),C("",LW2)]}));
  lR.push(new TableRow({children:[C("",LW1),C("以上",LW2,{right:true,size:18})]}));

  DC.push(new Table({rows:lR,width:{size:TW,type:WidthType.DXA}}));
  DC.push(new Paragraph({spacing:{after:100},children:[]}));

  // ━━━━━ 備考 TABLE ━━━━━
  DC.push(new Table({rows:[new TableRow({height:{value:800,rule:'atLeast'},children:[
    C("備考",1500,{bold:true,size:18}),
    C(data.remarks||'',8100),
  ]})],width:{size:TW,type:WidthType.DXA}}));

  const doc=new Document({sections:[{
    properties:{page:{size:{width:11906,height:16838},margin:{top:567,right:567,bottom:567,left:567}}},
    children:DC
  }]});
  return await Packer.toBlob(doc);
}

// =========================================================
//  ZIP CREATION (Word + all images)
// =========================================================
function dataURLtoBlob(dataUrl){
  const parts=dataUrl.split(',');
  const mime=parts[0].match(/:(.*?);/)[1];
  const b64=atob(parts[1]);
  const arr=new Uint8Array(b64.length);
  for(let i=0;i<b64.length;i++)arr[i]=b64.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

function getExt(dataUrl,key){
  // If we have the original filename, use its extension
  if(key && fileNames[key]){
    const ext=fileNames[key].split('.').pop().toLowerCase();
    if(ext)return ext;
  }
  const mime=dataUrl.split(',')[0].match(/:(.*?);/)[1];
  if(mime.includes('png'))return'png';
  if(mime.includes('jpeg')||mime.includes('jpg'))return'jpg';
  if(mime.includes('webp'))return'webp';
  if(mime.includes('pdf'))return'pdf';
  if(mime.includes('word')||mime.includes('document'))return'docx';
  return'jpg';
}

async function createZip(){
  const zip=new JSZip();
  const name=(data.fullname||'profile').replace(/\s+/g,'_');
  const dateStr=new Date().toISOString().slice(0,10);

  // Word doc
  const wordBlob=await generateWord();
  zip.file(`履歴書_${name}_${dateStr}.docx`,wordBlob);

  // Photos folder
  const folder=zip.folder(`写真_${name}`);

  if(photoData){folder.file(`証明写真_3x4.${getExt(photoData)}`,dataURLtoBlob(photoData));}
  if(zairyuFront){folder.file(`在留カード_表.${getExt(zairyuFront,'zairyuFront')}`,dataURLtoBlob(zairyuFront));}
  if(zairyuBack){folder.file(`在留カード_裏.${getExt(zairyuBack,'zairyuBack')}`,dataURLtoBlob(zairyuBack));}
  if(certSenmon){folder.file(`専門級_証明書.${getExt(certSenmon,'certSenmon')}`,dataURLtoBlob(certSenmon));}
  if(certLicense){folder.file(`運転免許.${getExt(certLicense,'certLicense')}`,dataURLtoBlob(certLicense));}
  if(certJlpt){folder.file(`日本語_証明書_JLPT.${getExt(certJlpt,'certJlpt')}`,dataURLtoBlob(certJlpt));}
  if(certTokutei){folder.file(`特定技能_証明書.${getExt(certTokutei,'certTokutei')}`,dataURLtoBlob(certTokutei));}

  return await zip.generateAsync({type:'blob'});
}

// =========================================================
//  ACTIONS
// =========================================================
async function doDownloadZip(){
  showLoading();
  try{
    const zipBlob=await createZip();
    const name=(data.fullname||'profile').replace(/\s+/g,'_');
    saveAs(zipBlob,`履歴書_${name}_${new Date().toISOString().slice(0,10)}.zip`);
    hideLoading();
    showSuccess();
  }catch(e){hideLoading();alert('Error: '+e.message);console.error(e);}
}

async function doEmailZip(){
  const sel=getSelectedEmails();
  if(!sel.length){alert('Please select at least one email!');return;}

  showLoading();
  try{
    const zipBlob=await createZip();
    const name=(data.fullname||'profile').replace(/\s+/g,'_');
    const fileName=`履歴書_${name}_${new Date().toISOString().slice(0,10)}.zip`;
    saveAs(zipBlob,fileName);

    hideLoading();

    const subj=encodeURIComponent(`履歴書 - ${data.fullname||'Candidate'}`);
    const body=encodeURIComponent(
      `履歴書を送付いたします。\n\n`+
      `氏名: ${data.fullname||'-'}\n`+
      `ふりがな: ${data.furigana||'-'}\n`+
      `国籍: ${data.nationality||'-'}\n`+
      `在留資格: ${data.visa||'-'}\n`+
      `作成日: ${new Date().toLocaleDateString('ja-JP')}\n\n`+
      `※ ZIPファイルを添付してください（履歴書Word + 証明書写真 + 在留カード写真）\n\n`+
      `---\nYourBright Co., Ltd.`
    );
    window.open(`mailto:${sel.join(',')}?subject=${subj}&body=${body}`,'_blank');

    setTimeout(()=>alert(t('emailReady')),500);
    showSuccess();
  }catch(e){hideLoading();alert('Error: '+e.message);console.error(e);}
}

function showSuccess(){
  document.getElementById('reviewArea').classList.add('hidden');
  document.getElementById('successArea').classList.remove('hidden');
}

  data={};photoData=null;zairyuFront=null;zairyuBack=null;
  certSenmon=null;certLicense=null;certJlpt=null;certTokutei=null;fileNames={};
  eduRows=[{start:'',end:'',detail:''}];

}
